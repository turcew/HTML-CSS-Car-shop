<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма заказа</title>
    <link rel="stylesheet" href="../css/form.css" />
  </head>
  <body>
    <a href="../../index.html">Назад</a>
    <form>
      <h1>Home work for CSS flexbox</h1>
      <div>
        <fieldset>
          <legend>Personal info</legend>

          <div>
            <label>First Name</label>
            <input type="text" />
          </div>

          <div>
            <label>Last Name</label>
            <input type="text" />
          </div>

          <div>
            <label>Birthday</label>
            <input type="text" placeholder="DD.MM.YYYY" />
          </div>

          <div>
            <label>Gender</label>
            <label>Male <input type="radio" name="gender" /></label>
            <label>Female <input type="radio" name="gender" /></label>
          </div>

          <div>
            <label>Drive experience</label>
            <select>
              <option>---</option>
              <option>1 год</option>
              <option>2–3 года</option>
              <option>более 3 лет</option>
            </select>
          </div>
        </fieldset>

        <fieldset>
          <legend>Contacts</legend>

          <div>
            <label>Email</label>
            <input />
          </div>

          <div>
            <label>Phone</label>
            <input />
          </div>

          <div>
            <label>Address</label>
            <textarea></textarea>
          </div>
        </fieldset>
        <fieldset>
          <legend>Car info</legend>

          <div>
            <label>Brand</label>
            <select>
              <option>---</option>
              <option>Toyota</option>
            </select>
          </div>
          <div>
            <label>Model</label>
            <select>
              <option>---</option>
              <option>MODELS-FERRARI</option>
            </select>
          </div>

          <label>Used <input type="checkbox" /></label>

          <label>Color</label>

          <div>
            <label>Red <input type="radio" name="color" checked /></label>
            <label>Black <input type="radio" name="color" /></label>
            <label>Blue <input type="radio" name="color" /></label>
            <label>White <input type="radio" name="color" /></label>
            <label>Grey <input type="radio" name="color" /></label>
          </div>
          <label>Price</label>
          <div>
            <input
              type="range"
              min="0"
              max="70"
              value="30"
              step="10"
              list="price-list"
            />
            <datalist id="price-list">
              <option value="0" label="10"></option>
              <option value="10" label="20"></option>
              <option value="20" label="30"></option>
              <option value="30" label="40"></option>
              <option value="40" label="50"></option>
              <option value="50" label="60"></option>
              <option value="60" label="70"></option>
              <option value="70" label="80"></option>
            </datalist>
          </div>
        </fieldset>
      </div>
      <div>
        <input type="reset" value="Cancel" />
        <input type="submit" value="Ok" />
      </div>
    </form>
  </body>
</html>
