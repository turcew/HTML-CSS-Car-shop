<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Форма заказа</title>
    <link rel="stylesheet" href="../css/form.css" />
  </head>
  <body>
    <a href="../../index.html">Назад</a>

    <form>
      <h1>Home work for CSS flexbox</h1>

      <div class="fieldsets-wrapper">
        <fieldset>
          <legend>Personal info</legend>

          <div>
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName" required />
          </div>

          <div>
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName" required />
          </div>

          <div>
            <label for="birthday">Birthday</label>
            <input
              type="text"
              id="birthday"
              name="birthday"
              placeholder="DD.MM.YYYY"
            />
          </div>

          <div class="radio-group">
            <span class="label-like">Gender</span>
            <label>
              <input type="radio" name="gender" id="gender-male" value="male" />
              Male
            </label>
            <label>
              <input
                type="radio"
                name="gender"
                id="gender-female"
                value="female"
              />
              Female
            </label>
          </div>

          <div>
            <label for="driveExperience">Drive experience</label>
            <select id="driveExperience" name="driveExperience">
              <option value="">---</option>
              <option value="1">1 год</option>
              <option value="2-3">2–3 года</option>
              <option value="3+">более 3 лет</option>
            </select>
          </div>
        </fieldset>

        <fieldset>
          <legend>Contacts</legend>

          <div>
            <label for="email">Email</label>
            <input type="email" id="email" name="email" />
          </div>

          <div>
            <label for="phone">Phone</label>
            <input type="tel" id="phone" name="phone" />
          </div>

          <div>
            <label for="address">Address</label>
            <textarea id="address" name="address" rows="3"></textarea>
          </div>
        </fieldset>

        <fieldset>
          <legend>Car info</legend>

          <div>
            <label for="brand">Brand</label>
            <select id="brand" name="brand">
              <option value="">---</option>
              <option value="toyota">Toyota</option>
            </select>
          </div>

          <div>
            <label for="model">Model</label>
            <select id="model" name="model">
              <option value="">---</option>
              <option value="ferrari">Ferrari</option>
            </select>
          </div>

          <div>
            <label for="used">
              <input type="checkbox" id="used" name="used" />
              Used
            </label>
          </div>

          <div>
            <label>
              <input
                type="radio"
                name="color"
                id="color-red"
                value="red"
                checked
              />
              Red
            </label>
            <label>
              <input type="radio" name="color" id="color-black" value="black" />
              Black
            </label>
            <label>
              <input type="radio" name="color" id="color-blue" value="blue" />
              Blue
            </label>
            <label>
              <input type="radio" name="color" id="color-white" value="white" />
              White
            </label>
            <label>
              <input type="radio" name="color" id="color-grey" value="grey" />
              Grey
            </label>
          </div>
          <label for="price">Price</label>
          <div>
            <div class="input-range">
              <input
                type="range"
                id="price"
                name="price"
                min="0"
                max="70"
                value="30"
                step="10"
                list="price-list"
              />
              <datalist id="price-list">
                <option value="0" label="10"></option>
                <option value="10" label="20"></option>
                <option value="20" label="30"></option>
                <option value="30" label="40"></option>
                <option value="40" label="50"></option>
                <option value="50" label="60"></option>
                <option value="60" label="70"></option>
                <option value="70" label="80"></option>
              </datalist>
            </div>
          </div>
        </fieldset>
      </div>

      <div class="buttons">
        <input type="reset" value="Cancel" />
        <input type="submit" value="Ok" />
      </div>
    </form>
  </body>
</html>
